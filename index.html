<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Readpile">
<title>Readpile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F2;--surface:#FFFFFF;--border:#E4E3DF;--border2:#D0CFC9;
  --ink:#1C1C1E;--ink-mid:#6B6A66;--ink-dim:#A8A7A2;
  --accent:#FF6B4A;--accent-lt:#FFF0EC;--accent-dk:#D94F31;
  --tag-bg:#EEEDE9;--tag-txt:#5A5955;
  --r:10px;--r-sm:7px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --ff:\'Inter\',system-ui,sans-serif;
  --ff-d:\'Fraunces\',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ff);font-size:14px;line-height:1.5;min-height:100dvh;padding-bottom:60px;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(247,246,242,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:54px;padding:0 16px;display:flex;align-items:center;gap:12px}
.logo{font-family:var(--ff-d);font-size:20px;font-weight:700;font-style:italic;letter-spacing:-.02em;flex-shrink:0}
.logo em{color:var(--accent);font-style:normal}
.search-wrap{flex:1;position:relative;max-width:300px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink-dim);pointer-events:none;flex-shrink:0}
#searchInput{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:100px;color:var(--ink);font-family:var(--ff);font-size:13px;padding:6px 12px 6px 30px;outline:none;transition:border-color .15s}
#searchInput:focus{border-color:var(--accent)}
#searchInput::placeholder{color:var(--ink-dim)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#34c759;transition:background .3s;flex-shrink:0}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.error{background:#ff3b30}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ADD BAR */
.add-wrap{padding:14px 16px 0}
.add-row{display:flex;gap:8px;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;box-shadow:var(--shadow);transition:border-color .15s}
.add-row:focus-within{border-color:var(--accent)}
.add-row input{flex:1;border:none;outline:none;background:transparent;font-family:var(--ff);font-size:14px;color:var(--ink)}
.add-row input::placeholder{color:var(--ink-dim)}
.add-row input[type=url]{font-size:16px} /* prevent iOS zoom */
.add-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.add-row input.ti{max-width:160px;font-size:13px}
.add-row input.tagi{width:90px;font-size:12px;color:var(--ink-mid)}
.btn{font-family:var(--ff);font-size:13px;font-weight:600;border:none;border-radius:7px;cursor:pointer;padding:7px 16px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent-dk)}
.btn-p:active{transform:scale(.97)}
.btn-s{background:var(--tag-bg);color:var(--ink)}
.btn-s:hover{background:var(--border2)}

/* FILTER BAR */
.filter-bar{padding:12px 16px 0;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{font-size:12px;font-weight:500;padding:4px 13px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink-mid);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.tc{background:var(--tag-bg);border-color:transparent;color:var(--tag-txt)}
.chip.tc.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* TOOLBAR */
.tbar{padding:12px 16px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tbar-label{font-size:11px;font-weight:600;color:var(--ink-dim);letter-spacing:.04em;text-transform:uppercase}
.tbar-right{margin-left:auto;display:flex;gap:6px}
.sm-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink-mid);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.sm-btn:hover{border-color:var(--border2);color:var(--ink)}
.sm-btn.danger:hover{border-color:#ff3b30;color:#ff3b30}

/* LIST */
#list{padding:10px 16px 0;display:flex;flex-direction:column;gap:2px}

/* ITEM */
.item{display:flex;align-items:baseline;gap:10px;padding:11px 12px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--r);transition:border-color .15s,opacity .2s;position:relative}
.item:hover{border-color:var(--border)}
.item.read{opacity:.45}
.item.read:hover{opacity:.65}

.item-left{display:flex;align-items:baseline;gap:8px;min-width:0;flex:1}

.favicon{width:14px;height:14px;border-radius:3px;flex-shrink:0;object-fit:contain;position:relative;top:1px}

.item-body{min-width:0;flex:1}

.item-title{font-family:var(--ff-d);font-size:15px;font-weight:700;line-height:1.3;color:var(--ink);text-decoration:none;display:block;word-break:break-word}
.item-title:hover{color:var(--accent)}
.item.read .item-title{color:var(--ink-dim)}

.item-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.item-domain{font-size:11px;color:var(--accent);font-weight:500}
.item-time{font-size:11px;color:var(--ink-dim)}
.item-tags{display:flex;gap:4px;flex-wrap:wrap}
.itag{font-size:10px;font-weight:500;background:var(--tag-bg);color:var(--tag-txt);padding:1px 7px;border-radius:100px;cursor:pointer;border:none;transition:background .12s}
.itag:hover{background:var(--accent-lt);color:var(--accent)}
.read-badge{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:var(--border);color:var(--ink-dim);padding:1px 6px;border-radius:100px}

.item-actions{display:flex;gap:4px;flex-shrink:0;margin-left:4px}
.act{width:28px;height:28px;border-radius:6px;border:1.5px solid transparent;background:transparent;color:var(--ink-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.act:hover{background:var(--tag-bg);border-color:var(--border);color:var(--ink)}
.act.done{color:var(--accent)}
.act.done:hover{background:var(--accent-lt);border-color:var(--accent)}
.act.del:hover{background:#fff0f0;color:#ff3b30;border-color:#ffb3b0}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--ink-dim)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-family:var(--ff-d);font-size:20px;font-weight:700;color:var(--ink);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--ink-mid);line-height:1.6;max-width:260px;margin:0 auto}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:9px 20px;border-radius:100px;z-index:999;pointer-events:none;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(28,28,30,.3);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:18px 18px 36px;width:100%;max-width:540px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);box-shadow:0 -4px 32px rgba(0,0,0,.12)}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:34px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.modal h3{font-family:var(--ff-d);font-size:18px;font-weight:700;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--ink);font-family:var(--ff);font-size:14px;padding:9px 11px;outline:none;resize:vertical;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1;padding:11px;font-size:14px;border-radius:var(--r-sm)}

/* CTX MENU */
.ctx{position:fixed;z-index:600;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.12);min-width:170px;overflow:hidden;opacity:0;pointer-events:none;transform:scale(.95);transform-origin:top left;transition:opacity .12s,transform .12s}
.ctx.open{opacity:1;pointer-events:all;transform:scale(1)}
.ctx-item{display:flex;align-items:center;gap:9px;padding:9px 13px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink);border:none;background:transparent;width:100%;text-align:left;transition:background .1s}
.ctx-item:hover{background:var(--bg)}
.ctx-item.danger{color:#ff3b30}
.ctx-item.danger:hover{background:#fff0f0}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* INCOMING */
.incoming{margin:12px 16px 0;background:var(--accent-lt);border:1.5px solid rgba(255,107,74,.2);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:8px}

@media(max-width:480px){
  .add-row input.ti,.add-row input.tagi{display:none}
  .search-wrap{display:none}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">read<em>pile</em></div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="Search…">
  </div>
  <div class="hdr-right">
    <div class="sync-dot" id="syncDot" title="Sync status"></div>
  </div>
</header>

<div class="incoming" id="incoming" style="display:none">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
  <span id="incomingTxt">Saving…</span>
</div>

<div class="add-wrap">
  <div class="add-row">
    <input type="url" id="urlInput" placeholder="Paste a URL…" inputmode="url" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="add-sep"></div>
    <input class="ti" type="text" id="titleInput" placeholder="Title (optional)">
    <div class="add-sep"></div>
    <input class="tagi" type="text" id="tagInput" placeholder="# tag">
    <button class="btn btn-p" onclick="addFromForm()">Save</button>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="chip active" onclick="setFilter('all')">All</button>
  <button class="chip" onclick="setFilter('unread')">Unread</button>
  <button class="chip" onclick="setFilter('read')">Read</button>
</div>

<div class="tbar">
  <span class="tbar-label" id="tbarLabel">Loading…</span>
  <div class="tbar-right">
    <button class="sm-btn" onclick="markAllRead()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Mark all read
    </button>
    <button class="sm-btn danger" onclick="clearRead()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      Clear read
    </button>
  </div>
</div>

<div id="list"></div>
<div id="toast"></div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay" onclick="maybeCloseModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Edit article</h3>
    <div class="field"><label>Title</label><input type="text" id="editTitle"></div>
    <div class="field"><label>URL</label><input type="url" id="editUrl"></div>
    <div class="field"><label>Tags (comma separated)</label><input type="text" id="editTags" placeholder="design, tech, ai"></div>
    <div class="field"><label>Notes</label><textarea id="editNotes" rows="3" placeholder="Any notes…"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-s" onclick="closeEdit()">Cancel</button>
      <button class="btn btn-p" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx" id="ctx">
  <button class="ctx-item" id="ctxOpen"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Open link</button>
  <button class="ctx-item" id="ctxRead"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Mark as read</button>
  <button class="ctx-item" id="ctxEdit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</button>
  <button class="ctx-item" id="ctxCopy"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy URL</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item danger" id="ctxDel"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>Delete</button>
</div>

<script>
// ── SUPABASE ──
const SB  = 'https://akarlhkexbmpyyfmfkoi.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrYXJsaGtleGJtcHl5Zm1ma29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDYyNjgsImV4cCI6MjA5NzAyMjI2OH0.aWLuR-wFKZVurGxJSDkXuJnCTPSRLcRueP4uPZqRpCo';
const H   = {'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY};

function sync(s){
  const d=document.getElementById('syncDot');
  d.className='sync-dot'+(s==='ok'?'':' '+s);
}
async function dbq(path,opts={}){
  sync('syncing');
  try{
    const r=await fetch(SB+'/rest/v1/'+path,{...opts,headers:{...H,...(opts.headers||{})}});
    sync(r.ok?'ok':'error'); return r;
  }catch(e){sync('error');throw e;}
}
async function dbLoad(){
  const r=await dbq('articles?order=created_at.desc&select=*');
  if(!r.ok)return[];
  return(await r.json()).map(toItem);
}
async function dbInsert(item){
  await dbq('articles',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(toRow(item))});
}
async function dbUpdate(id,patch){
  await dbq(`articles?id=eq.${id}`,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(patch)});
}
async function dbDelete(id){
  await dbq(`articles?id=eq.${id}`,{method:'DELETE'});
}
function toRow(i){return{id:i.id,url:i.url,title:i.title,description:i.desc||'',thumb:i.thumb||null,tags:i.tags||[],notes:i.notes||'',read:i.read,created_at:new Date(i.ts).toISOString()};}
function toItem(r){return{id:r.id,url:r.url,title:r.title,desc:r.description||'',thumb:r.thumb||null,tags:r.tags||[],notes:r.notes||'',read:r.read,ts:new Date(r.created_at).getTime()};}

// ── STATE ──
let items=[],filter='all',tag=null,q='',editId=null,ctxId=null;

// ── UTILS ──
function getDomain(url){try{return new URL(url).hostname.replace(/^www\./,'')}catch{return url.slice(0,40)}}
function faviconUrl(url){try{return'https://www.google.com/s2/favicons?domain='+encodeURIComponent(new URL(url).origin)+'&sz=32'}catch{return''}}
function relTime(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';if(d<604800000)return Math.floor(d/86400000)+'d ago';return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function parseTags(s){if(!s)return[];return s.split(/[,\s]+/).map(t=>t.replace(/^#/,'').trim().toLowerCase()).filter(Boolean)}
function allTags(){const s=new Set();items.forEach(i=>(i.tags||[]).forEach(t=>s.add(t)));return[...s].sort()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function toast(msg,dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ── FETCH TITLE from microlink (no image, just metadata) ──
async function fetchMeta(id,url){
  try{
    const r=await fetch('https://api.microlink.io/?url='+encodeURIComponent(url)+'&palette=false&audio=false&video=false&iframe=false&screenshot=false');
    const d=await r.json();
    if(d.status==='success'){
      const item=items.find(i=>i.id===id);
      if(!item)return;
      let changed=false;
      if(d.data&&d.data.title&&item.title===getDomain(url)){
        item.title=d.data.title;
        const el=document.getElementById('t-'+id);
        if(el){el.textContent=item.title;el.title=item.title;}
        changed=true;
      }
      if(changed)await dbUpdate(id,{title:item.title});
    }
  }catch(e){}
}

// ── ADD ──
async function addItem(url,title,tags){
  url=url.trim();
  if(!url)return null;
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  if(items.find(i=>i.url===url))return'dupe';
  const item={id:uid(),url,title:title&&title.trim()?title.trim():getDomain(url),tags:tags||[],read:false,ts:Date.now(),desc:'',thumb:null,notes:''};
  items.unshift(item);
  render();
  await dbInsert(item);
  fetchMeta(item.id,url); // async enrich title
  return item;
}

async function addFromForm(){
  const url=document.getElementById('urlInput').value;
  const title=document.getElementById('titleInput').value;
  const tags=parseTags(document.getElementById('tagInput').value);
  const res=await addItem(url,title,tags);
  if(res==='dupe'){toast('Already in your pile');return;}
  if(!res){toast('Enter a valid URL');return;}
  document.getElementById('urlInput').value='';
  document.getElementById('titleInput').value='';
  document.getElementById('tagInput').value='';
  toast('✓ Saved!');
}

// ── RENDER ──
function vis(){
  let l=[...items];
  if(filter==='unread')l=l.filter(i=>!i.read);
  if(filter==='read')l=l.filter(i=>i.read);
  if(tag)l=l.filter(i=>(i.tags||[]).includes(tag));
  if(q){const lq=q.toLowerCase();l=l.filter(i=>i.title.toLowerCase().includes(lq)||i.url.toLowerCase().includes(lq)||(i.tags||[]).some(t=>t.includes(lq)));}
  return l;
}

function render(){
  const list=document.getElementById('list');
  const shown=vis();
  const unread=items.filter(i=>!i.read).length;
  // label
  const lbl=q?`${shown.length} result${shown.length!==1?'s':''}`:
    filter==='all'?`${items.length} article${items.length!==1?'s':''} · ${unread} unread`:
    `${shown.length} ${filter}`;
  document.getElementById('tbarLabel').textContent=lbl;
  // tag bar
  renderFilterBar();
  // empty
  if(!shown.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">${q?'No results':filter==='read'?'Nothing read yet':'Your pile is empty'}</div><div class="empty-sub">${q?'Try a different search.':'Paste a URL above or share from your phone.'}</div></div>`;
    return;
  }
  list.innerHTML=shown.map(itemHTML).join('');
}

function itemHTML(item){
  const domain=getDomain(item.url);
  const fav=faviconUrl(item.url);
  const tags=(item.tags||[]).map(t=>`<button class="itag" onclick="filterTag('${esc(t)}')">#${esc(t)}</button>`).join('');
  return`<div class="item${item.read?' read':''}" data-id="${item.id}" oncontextmenu="openCtx(event,'${item.id}')">
  <div class="item-left">
    <img class="favicon" src="${esc(fav)}" alt="" onerror="this.style.display='none'">
    <div class="item-body">
      <a class="item-title" id="t-${item.id}" href="${esc(item.url)}" target="_blank" rel="noopener" title="${esc(item.title)}">${esc(item.title)}</a>
      <div class="item-meta">
        <span class="item-domain">${esc(domain)}</span>
        <span class="item-time">${relTime(item.ts)}</span>
        ${item.read?'<span class="read-badge">read</span>':''}
        ${tags?`<div class="item-tags">${tags}</div>`:''}
      </div>
    </div>
  </div>
  <div class="item-actions">
    <button class="act${item.read?' done':''}" onclick="toggleRead('${item.id}')" title="${item.read?'Mark unread':'Mark read'}">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <button class="act" onclick="openEdit('${item.id}')" title="Edit">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <button class="act del" onclick="deleteItem('${item.id}')" title="Delete">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </button>
  </div>
</div>`;
}

function renderFilterBar(){
  const bar=document.getElementById('filterBar');
  const tags=allTags();
  const statics=['all','unread','read'].map(f=>`<button class="chip${filter===f&&!tag?' active':''}" onclick="setFilter('${f}')">${f[0].toUpperCase()+f.slice(1)}</button>`).join('');
  const tc=tags.map(t=>`<button class="chip tc${tag===t?' active':''}" onclick="filterTag('${esc(t)}')">#${esc(t)}</button>`).join('');
  bar.innerHTML=statics+tc;
}

// ── ACTIONS ──
async function toggleRead(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  item.read=!item.read;render();
  await dbUpdate(id,{read:item.read});
}
async function deleteItem(id){
  items=items.filter(i=>i.id!==id);render();toast('Deleted');
  await dbDelete(id);
}
async function markAllRead(){
  const v=vis();
  v.forEach(i=>{const x=items.find(j=>j.id===i.id);if(x)x.read=true;});
  render();toast('Marked all as read');
  await Promise.all(v.map(i=>dbUpdate(i.id,{read:true})));
}
async function clearRead(){
  const del=items.filter(i=>i.read);
  if(!del.length){toast('No read articles');return;}
  items=items.filter(i=>!i.read);render();toast(`Removed ${del.length} article${del.length>1?'s':''}`);
  await Promise.all(del.map(i=>dbDelete(i.id)));
}

// ── FILTERS ──
function setFilter(f){filter=f;tag=null;render();}
function filterTag(t){tag=tag===t?null:t;filter='all';render();}
document.getElementById('searchInput').addEventListener('input',e=>{q=e.target.value.trim();render();});

// ── EDIT ──
function openEdit(id){
  editId=id;const item=items.find(i=>i.id===id);if(!item)return;
  document.getElementById('editTitle').value=item.title;
  document.getElementById('editUrl').value=item.url;
  document.getElementById('editTags').value=(item.tags||[]).join(', ');
  document.getElementById('editNotes').value=item.notes||'';
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit(){document.getElementById('editOverlay').classList.remove('open');editId=null;}
function maybeCloseModal(e){if(e.target===document.getElementById('editOverlay'))closeEdit();}
async function saveEdit(){
  const item=items.find(i=>i.id===editId);if(!item)return;
  item.title=document.getElementById('editTitle').value.trim()||item.title;
  item.url=document.getElementById('editUrl').value.trim()||item.url;
  item.tags=parseTags(document.getElementById('editTags').value);
  item.notes=document.getElementById('editNotes').value.trim();
  closeEdit();render();toast('Saved');
  await dbUpdate(editId,{title:item.title,url:item.url,tags:item.tags,notes:item.notes});
}

// ── CONTEXT MENU ──
function openCtx(e,id){
  e.preventDefault();ctxId=id;
  const item=items.find(i=>i.id===id);if(!item)return;
  document.getElementById('ctxRead').innerHTML=item.read
    ?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>Mark as unread'
    :'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Mark as read';
  const m=document.getElementById('ctx');
  let x=e.clientX,y=e.clientY;
  if(x+190>window.innerWidth)x=window.innerWidth-200;
  if(y+200>window.innerHeight)y=window.innerHeight-210;
  m.style.left=x+'px';m.style.top=y+'px';m.classList.add('open');
}
function closeCtx(){document.getElementById('ctx').classList.remove('open');ctxId=null;}
document.getElementById('ctxOpen').onclick=()=>{const i=items.find(x=>x.id===ctxId);if(i)window.open(i.url,'_blank');closeCtx();};
document.getElementById('ctxRead').onclick=()=>{toggleRead(ctxId);closeCtx();};
document.getElementById('ctxEdit').onclick=()=>{openEdit(ctxId);closeCtx();};
document.getElementById('ctxCopy').onclick=()=>{const i=items.find(x=>x.id===ctxId);if(i){navigator.clipboard?.writeText(i.url);toast('Copied');}closeCtx();};
document.getElementById('ctxDel').onclick=()=>{deleteItem(ctxId);closeCtx();};
document.addEventListener('click',()=>closeCtx());
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCtx();closeEdit();}});

// ── SHARE PARAMS ──
async function handleShare(){
  const p=new URLSearchParams(window.location.search);
  const url=p.get('url')||p.get('u')||p.get('link');
  const title=p.get('title')||p.get('t')||'';
  const tags=parseTags(p.get('tags')||'');
  if(!url)return;
  document.getElementById('incoming').style.display='flex';
  document.getElementById('incomingTxt').textContent='Saving: '+getDomain(url);
  const res=await addItem(url,title,tags);
  document.getElementById('incoming').style.display='none';
  if(res==='dupe')toast('Already in your pile');
  else if(res)toast('✓ Saved from share!');
  window.history.replaceState({},'',window.location.pathname);
}

// ── KEYBOARD ──
['urlInput','titleInput','tagInput'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')addFromForm();});
});

// ── INIT ──
(async()=>{
  document.getElementById('list').innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--ink-dim);font-size:13px">Loading…</div>';
  try{items=await dbLoad();}catch(e){toast('Could not connect');}
  await handleShare();
  render();
})();
</script>
</body>
</html>
